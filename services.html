<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>Servicios Premium</title>
  <!-- Google Fonts & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f9f5f0 0%, #eae3db 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .app-container {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.12), 0 10px 20px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }
    /* Header con logo */
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 0.25rem;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-left img {
      height: 52px;
      width: auto;
      object-fit: contain;
      border-radius: 12px;
    }
    .header-left h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #2d1f14;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header-left h1 i {
      color: #b28b6f;
      font-size: 2.6rem;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .subtitle {
      color: #6b5a4b;
      font-weight: 400;
      font-size: 1rem;
      margin-bottom: 2rem;
      border-left: 4px solid #b28b6f;
      padding-left: 1rem;
      opacity: 0.8;
      width: 100%;
    }
    /* Formulario */
    .form-card {
      background: white;
      border-radius: 32px;
      padding: 1.8rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      border: 1px solid #f0ebe6;
      transition: box-shadow 0.3s ease;
    }
    .form-card:hover {
      box-shadow: 0 12px 36px rgba(0,0,0,0.06);
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      align-items: end;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b5a4b;
    }
    .form-group input,
    .form-group textarea {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 0.7rem 1rem;
      border: 1.5px solid #e5ddd6;
      border-radius: 18px;
      background: #fcfaf8;
      transition: border 0.2s, box-shadow 0.2s;
      width: 100%;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #b28b6f;
      box-shadow: 0 0 0 4px rgba(178, 139, 111, 0.15);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 44px;
      max-height: 100px;
    }
    .form-actions {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .btn {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 40px;
      background: #eae3db;
      color: #2d1f14;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }
    .btn-primary {
      background: #2d1f14;
      color: white;
      box-shadow: 0 8px 18px rgba(45, 31, 20, 0.25);
    }
    .btn-primary:hover {
      background: #4d3425;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(45, 31, 20, 0.3);
    }
    .btn-secondary {
      background: #f0ebe6;
    }
    .btn-secondary:hover {
      background: #e5ddd6;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: #d94f4f;
      color: white;
    }
    .btn-danger:hover {
      background: #c23a3a;
      transform: translateY(-2px);
    }
    .btn-success {
      background: #3a7d5e;
      color: white;
    }
    .btn-success:hover {
      background: #2e644b;
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .btn .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabla */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 28px;
      background: white;
      box-shadow: 0 8px 28px rgba(0,0,0,0.04);
      border: 1px solid #f0ebe6;
      padding: 0.5rem 0.5rem 0.5rem 0.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 600px;
    }
    th {
      text-align: left;
      padding: 1rem 0.8rem;
      color: #6b5a4b;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 2px solid #f0ebe6;
      background: #fcfaf8;
    }
    td {
      padding: 0.9rem 0.8rem;
      border-bottom: 1px solid #f3eee9;
      color: #2d1f14;
      vertical-align: middle;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #fcf9f6;
    }
    .col-id { font-weight: 600; color: #b28b6f; }
    .col-cliente { font-weight: 500; }
    .col-monto { font-family: 'Inter', monospace; font-weight: 600; }
    .acciones {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .btn-icon {
      background: transparent;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      color: #6b5a4b;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 500;
    }
    .btn-icon:hover {
      background: #f0ebe6;
      transform: scale(1.05);
    }
    .btn-icon.detail { color: #b28b6f; }
    .btn-icon.detail:hover { background: #f0ebe6; }
    .btn-icon.edit { color: #3a7d5e; }
    .btn-icon.edit:hover { background: #e6f0ea; }
    .btn-icon.delete { color: #d94f4f; }
    .btn-icon.delete:hover { background: #fce8e8; }

    /* Resumen */
    .summary {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
      padding: 1.2rem 0.5rem;
      border-top: 1px solid #e5ddd6;
      font-size: 0.9rem;
      color: #4d3e31;
    }
    .summary span i { margin-right: 0.5rem; color: #b28b6f; }

    /* Modal (ventana emergente) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white;
      max-width: 600px;
      width: 100%;
      border-radius: 48px;
      padding: 2.5rem 2.2rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.2);
      position: relative;
      animation: modalFade 0.25s ease;
    }
    @keyframes modalFade {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.8rem;
      font-size: 1.8rem;
      background: none;
      border: none;
      color: #6b5a4b;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .modal-close:hover { transform: rotate(90deg); }
    .modal-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2d1f14;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .modal-title i { color: #b28b6f; }
    .detail-item {
      display: flex;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0ebe6;
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-label {
      font-weight: 600;
      color: #6b5a4b;
      width: 120px;
      flex-shrink: 0;
    }
    .detail-value {
      color: #2d1f14;
      word-break: break-word;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 1rem; }
      .app-container { padding: 1.5rem 1rem; border-radius: 32px; }
      .header-left h1 { font-size: 1.8rem; }
      .header-left img { height: 40px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-actions { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
      .summary { flex-direction: column; align-items: flex-start; }
      .modal-box { padding: 1.8rem 1.2rem; }
      .detail-item { flex-wrap: wrap; gap: 0.2rem; }
      .detail-label { width: 100%; }
      .btn-icon { font-size: 0.75rem; padding: 0.3rem 0.5rem; }
    }
    @media (max-width: 480px) {
      .app-container { padding: 1rem 0.8rem; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.5rem 0.4rem; }
      .acciones { gap: 0.2rem; }
    }
  </style>
</head>
<body>
<div class="app-container" id="app">

  <!-- HEADER CON LOGO -->
  <div class="header-main">
    <div class="header-left">
      <img src="logo.png" alt="Logo" id="logoImg" onerror="this.style.display='none'" />
      <h1><i class="fas fa-concierge-bell"></i> ServiComp+</h1>
    </div>
    <div class="header-right">
      <button class="btn btn-secondary" onclick="loadData()">
        <i class="fas fa-sync-alt"></i> Recargar
      </button>
    </div>
  </div>
  <div class="subtitle">Registro de servicios</div>

  <!-- FORMULARIO -->
  <div class="form-card">
    <form id="serviceForm" onsubmit="return false;">
      <div class="form-grid">
        <div class="form-group">
          <label for="fecha"><i class="far fa-calendar-alt"></i> Fecha</label>
          <input type="date" id="fecha" required />
        </div>
        <div class="form-group">
          <label for="cliente"><i class="fas fa-user"></i> Cliente</label>
          <input type="text" id="cliente" placeholder="Nombre del cliente" required />
        </div>
        <div class="form-group">
          <label for="descripcion"><i class="fas fa-align-left"></i> Descripción</label>
          <textarea id="descripcion" placeholder="Detalle del servicio" rows="1"></textarea>
        </div>
        <div class="form-group">
          <label for="inversion"><i class="fas fa-arrow-down"></i> Inversión (S/)</label>
          <input type="number" id="inversion" step="0.01" placeholder="0.00" required />
        </div>
        <div class="form-group">
          <label for="venta"><i class="fas fa-arrow-up"></i> Venta (S/)</label>
          <input type="number" id="venta" step="0.01" placeholder="0.00" required />
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveRecord()">
            <i class="fas fa-save"></i> Guardar
          </button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display:none;">
            <i class="fas fa-times"></i> Cancelar
          </button>
        </div>
      </div>
      <input type="hidden" id="editId" value="" />
    </form>
  </div>

  <!-- TABLA -->
  <div class="table-wrapper">
    <table id="dataTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Descripción</th>
          <th>Inversión</th>
          <th>Venta</th>
          <th>Cliente</th>
          <th style="text-align:center;">Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" style="text-align:center; padding:2rem; color:#6b5a4b;">
          <i class="fas fa-spinner fa-spin"></i> Cargando datos...
        </td></tr>
      </tbody>
    </table>
  </div>

  <!-- RESUMEN -->
  <div class="summary" id="summary">
    <span><i class="fas fa-list-ul"></i> Registros: <strong id="countReg">0</strong></span>
    <span><i class="fas fa-arrow-down" style="color:#3a7d5e;"></i> Total Inversión: <strong id="totalInv">S/ 0.00</strong></span>
    <span><i class="fas fa-arrow-up" style="color:#b28b6f;"></i> Total Venta: <strong id="totalVen">S/ 0.00</strong></span>
    <span><i class="fas fa-chart-line"></i> Ganancia: <strong id="totalGan">S/ 0.00</strong></span>
  </div>
</div>

<!-- MODAL (VENTANA EMERGENTE) PARA INFORME DETALLADO -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <div class="modal-title"><i class="fas fa-file-invoice"></i> Detalle del servicio</div>
    <div id="detailContent">
      <div class="detail-item"><span class="detail-label">ID</span><span class="detail-value" id="detId">-</span></div>
      <div class="detail-item"><span class="detail-label">Fecha</span><span class="detail-value" id="detFecha">-</span></div>
      <div class="detail-item"><span class="detail-label">Cliente</span><span class="detail-value" id="detCliente">-</span></div>
      <div class="detail-item"><span class="detail-label">Descripción</span><span class="detail-value" id="detDesc">-</span></div>
      <div class="detail-item"><span class="detail-label">Inversión</span><span class="detail-value" id="detInv">-</span></div>
      <div class="detail-item"><span class="detail-label">Venta</span><span class="detail-value" id="detVen">-</span></div>
      <div class="detail-item"><span class="detail-label">Ganancia</span><span class="detail-value" id="detGan">-</span></div>
    </div>
  </div>
</div>

<script>
  // ================================================================
  //  CONFIGURACIÓN
  // ================================================================
  const SHEET_ID = '1CnR6YNmJKuUY5nVsbAYTLCoAQU0ftOAGbH2UZOSls5I';
  const SHEET_NAME = 'clientes';
  const OPEN_SHEET_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysQeeWNEowYStCnnpYuMJAjbE1LN8dOwi3Ec8xDoBSKg93aA-EqFOofIbA3YOOYQN_Pg/exec';

  let editingId = null;
  let records = [];

  // ================================================================
  //  FECHA ACTUAL POR DEFECTO
  // ================================================================
  function setDefaultDate() {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    document.getElementById('fecha').value = `${y}-${m}-${d}`;
  }

  // ================================================================
  //  CARGAR DATOS (lectura con OpenSheet)
  // ================================================================
  async function loadData() {
    try {
      const resp = await fetch(OPEN_SHEET_URL);
      if (!resp.ok) throw new Error('Error al obtener datos');
      const data = await resp.json();
      records = data.map(row => ({
        id: parseInt(row.id) || 0,
        fecha: row.fecha || '',
        descripcion: row.descripcion || '',
        inversion: parseFloat(row.inversion) || 0,
        venta: parseFloat(row.venta) || 0,
        cliente: row.cliente || ''
      }));
      renderTable();
      updateSummary();
    } catch (error) {
      console.error('loadData error:', error);
      document.getElementById('tableBody').innerHTML = `
        <tr><td colspan="7" style="text-align:center; padding:2rem; color:#b28b6f;">
          <i class="fas fa-exclamation-triangle"></i> Error al cargar.
          <button class="btn btn-secondary" onclick="loadData()" style="margin-left:1rem;">
            <i class="fas fa-redo"></i> Reintentar
          </button>
        </td></tr>
      `;
    }
  }

  // ================================================================
  //  RENDER TABLA
  // ================================================================
  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!records.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:1.5rem; color:#6b5a4b;">
        <i class="fas fa-inbox"></i> No hay registros aún.
      </td></tr>`;
      return;
    }
    let html = '';
    records.forEach(r => {
      const gan = (r.venta - r.inversion).toFixed(2);
      html += `
        <tr>
          <td class="col-id">${r.id}</td>
          <td>${r.fecha}</td>
          <td>${r.descripcion || '—'}</td>
          <td class="col-monto">S/ ${r.inversion.toFixed(2)}</td>
          <td class="col-monto">S/ ${r.venta.toFixed(2)}</td>
          <td class="col-cliente">${r.cliente}</td>
          <td>
            <div class="acciones">
              <button class="btn-icon detail" title="Ver detalle" onclick="showDetail(${r.id})">
                <i class="fas fa-eye"></i> Detalle
              </button>
              <button class="btn-icon edit" title="Editar" onclick="editRecord(${r.id})">
                <i class="fas fa-pen"></i> Editar
              </button>
              <button class="btn-icon delete" title="Eliminar" onclick="deleteRecord(${r.id})">
                <i class="fas fa-trash"></i> Eliminar
              </button>
            </div>
          </td>
        </tr>
      `;
    });
    tbody.innerHTML = html;
  }

  // ================================================================
  //  RESUMEN
  // ================================================================
  function updateSummary() {
    const totalInv = records.reduce((s, r) => s + r.inversion, 0);
    const totalVen = records.reduce((s, r) => s + r.venta, 0);
    const gan = totalVen - totalInv;
    document.getElementById('countReg').textContent = records.length;
    document.getElementById('totalInv').textContent = `S/ ${totalInv.toFixed(2)}`;
    document.getElementById('totalVen').textContent = `S/ ${totalVen.toFixed(2)}`;
    document.getElementById('totalGan').textContent = `S/ ${gan.toFixed(2)}`;
  }

  // ================================================================
  //  ACCIONES: AGREGAR / EDITAR / ELIMINAR
  // ================================================================
  function saveRecord() {
    const fecha = document.getElementById('fecha').value;
    const cliente = document.getElementById('cliente').value.trim();
    const descripcion = document.getElementById('descripcion').value.trim();
    const inversion = parseFloat(document.getElementById('inversion').value) || 0;
    const venta = parseFloat(document.getElementById('venta').value) || 0;

    if (!fecha || !cliente) {
      alert('Completa la fecha y el cliente.');
      return;
    }

    const editId = document.getElementById('editId').value;
    const action = editId ? 'update' : 'add';
    const data = {
      fecha,
      cliente,
      descripcion,
      inversion,
      venta,
      id: editId ? parseInt(editId) : null
    };

    sendAction(action, data);
  }

  function editRecord(id) {
    const record = records.find(r => r.id === id);
    if (!record) return;
    document.getElementById('editId').value = id;
    document.getElementById('fecha').value = record.fecha;
    document.getElementById('cliente').value = record.cliente;
    document.getElementById('descripcion').value = record.descripcion;
    document.getElementById('inversion').value = record.inversion;
    document.getElementById('venta').value = record.venta;

    document.getElementById('saveBtn').innerHTML = '<i class="fas fa-pen"></i> Actualizar';
    document.getElementById('cancelBtn').style.display = 'inline-flex';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    document.getElementById('editId').value = '';
    setDefaultDate();
    document.getElementById('cliente').value = '';
    document.getElementById('descripcion').value = '';
    document.getElementById('inversion').value = '';
    document.getElementById('venta').value = '';
    document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> Guardar';
    document.getElementById('cancelBtn').style.display = 'none';
    editingId = null;
  }

  function deleteRecord(id) {
    if (!confirm(`¿Eliminar el servicio con ID ${id}?`)) return;
    sendAction('delete', { id });
  }

  // ================================================================
  //  ENVÍO AL SCRIPT (POST con mode: 'no-cors')
  //  + RECARGA AUTOMÁTICA (500ms para actualización casi inmediata)
  // ================================================================
  async function sendAction(action, data) {
    const payload = { action, data };
    const saveBtn = document.getElementById('saveBtn');
    // Mostrar spinner en el botón
    const originalText = saveBtn.innerHTML;
    saveBtn.innerHTML = '<span class="spinner"></span> Guardando...';
    saveBtn.disabled = true;
    document.querySelectorAll('.btn').forEach(b => b.disabled = true);

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      // Recarga rápida (500ms) para que la tabla se actualice casi al instante
      setTimeout(() => {
        cancelEdit();
        loadData();
        // Restaurar botón
        saveBtn.innerHTML = originalText;
        saveBtn.disabled = false;
        document.querySelectorAll('.btn').forEach(b => b.disabled = false);
      }, 3000);

    } catch (error) {
      console.error('sendAction error:', error);
      alert('Error al comunicarse con el servidor.');
      saveBtn.innerHTML = originalText;
      saveBtn.disabled = false;
      document.querySelectorAll('.btn').forEach(b => b.disabled = false);
    }
  }

  // ================================================================
  //  MODAL (VENTANA EMERGENTE) PARA INFORME DETALLADO
  // ================================================================
  function showDetail(id) {
    const record = records.find(r => r.id === id);
    if (!record) return;
    document.getElementById('detId').textContent = record.id;
    document.getElementById('detFecha').textContent = record.fecha;
    document.getElementById('detCliente').textContent = record.cliente;
    document.getElementById('detDesc').textContent = record.descripcion || '—';
    document.getElementById('detInv').textContent = `S/ ${record.inversion.toFixed(2)}`;
    document.getElementById('detVen').textContent = `S/ ${record.venta.toFixed(2)}`;
    const gan = (record.venta - record.inversion).toFixed(2);
    document.getElementById('detGan').textContent = `S/ ${gan}`;
    document.getElementById('detailModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
  }

  // Cerrar modal al hacer clic fuera del cuadro
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ================================================================
  //  INICIO
  // ================================================================
  setDefaultDate();
  loadData();
</script>
</body>
</html>
