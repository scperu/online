<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cuentas - Pepito Bodega</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset y estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Modo claro (por defecto) */
        body.light-mode {
            background-color: #f8f9fa;
            color: #1a1a1a;
        }

        /* Modo oscuro */
        body.dark-mode {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }

        /* Tarjeta principal */
        .main-card {
            width: 100%;
            max-width: 28rem;
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
            text-align: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body.light-mode .main-card {
            background-color: #ffffff;
        }

        body.dark-mode .main-card {
            background-color: #2d2d2d;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        /* Avatar con logo */
        .avatar {
            width: 6rem;
            height: 6rem;
            border-radius: 9999px;
            margin: 0 auto 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        body.light-mode .avatar {
            background-color: #e9e7e2;
        }

        body.dark-mode .avatar {
            background-color: #404040;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Título */
        .title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            transition: color 0.3s ease;
        }

        body.light-mode .title {
            color: #111827;
        }

        body.dark-mode .title {
            color: #f3f4f6;
        }

        /* Botón de modo oscuro */
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-size: 1.25rem;
        }

        body.light-mode .theme-toggle {
            background-color: #f3f4f6;
            color: #6b7280;
        }

        body.light-mode .theme-toggle:hover {
            background-color: #e5e7eb;
            color: #374151;
        }

        body.dark-mode .theme-toggle {
            background-color: #404040;
            color: #9ca3af;
        }

        body.dark-mode .theme-toggle:hover {
            background-color: #4b4b4b;
            color: #e5e7eb;
        }

        /* Tarjetas de cuentas */
        .account-card {
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 1rem;
            gap: 0.75rem;
        }

        .account-card:last-child {
            margin-bottom: 0;
        }

        .account-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .account-card .clickable {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .account-card .clickable:hover {
            opacity: 0.8;
        }

        /* Botón QR */
        .qr-button {
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.2s ease, transform 0.2s ease;
            flex-shrink: 0;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .qr-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .qr-button:active {
            transform: scale(0.95);
        }

        .qr-button i {
            font-size: 1rem;
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 0.5rem;
        }

        body.dark-mode .skeleton {
            background: linear-gradient(90deg, #3a3a3a 25%, #4a4a4a 50%, #3a3a3a 75%);
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Modal para QR */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: white;
            border-radius: 1rem;
            padding: 1.5rem;
            max-width: 24rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            position: relative;
        }

        body.dark-mode .modal-content {
            background-color: #2d2d2d;
            color: #f0f0f0;
        }

        /* Logo del banco en el modal (esquina superior izquierda) */
        .modal-logo {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: white;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.1);
        }

        .modal-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-logo .logo-text {
            font-size: 0.65rem;
            font-weight: 700;
        }

        /* Nombre del titular en el modal */
        .modal-titular {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.dark-mode .modal-titular {
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Notificación */
        .notification {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 100;
            font-weight: 500;
            animation: slideDown 0.3s ease;
            max-width: 90%;
            text-align: center;
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* Footer */
        .footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.6;
            transition: color 0.3s ease;
        }

        .footer a {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s ease;
            cursor: pointer;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .main-card {
                padding: 1rem;
            }
            
            .account-card {
                padding: 0.75rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            
            .account-card .flex {
                min-width: 0;
                flex: 1;
            }
            
            .account-card .truncate {
                max-width: 100%;
            }
            
            .qr-button {
                padding: 0.4rem 0.75rem;
                font-size: 0.7rem;
            }
            
            .qr-button i {
                font-size: 0.85rem;
            }
            
            .avatar {
                width: 4.5rem;
                height: 4.5rem;
            }
            
            .title {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 380px) {
            .account-card {
                flex-direction: column;
                align-items: stretch;
            }
            
            .account-card .flex {
                justify-content: center;
            }
            
            .account-card .text-left {
                text-align: center;
            }
            
            .qr-button {
                justify-content: center;
                padding: 0.5rem;
            }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c4c4c4;
            border-radius: 3px;
        }
        
        body.dark-mode ::-webkit-scrollbar-thumb {
            background: #555;
        }

        /* Tooltip para los textos clickeables */
        .clickable {
            position: relative;
            cursor: pointer;
        }

        .clickable .tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            white-space: nowrap;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            margin-bottom: 0.25rem;
            pointer-events: none;
        }

        .clickable:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Mismo tamaño de fuente para CTA y CCI */
        .text-account {
            font-size: 0.75rem;
            line-height: 1rem;
        }

        .text-cci {
            font-size: 0.75rem;
            line-height: 1rem;
        }
    </style>
</head>
<body class="light-mode">

    <div class="main-card">
        
        <!-- Botón Modo Oscuro (funcional) -->
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar modo oscuro">
            <i class="fa-regular fa-moon"></i>
        </button>

        <!-- Avatar con logo.png -->
        <div class="avatar">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.textContent='PE'; this.parentElement.style.fontSize='1.5rem'; this.parentElement.style.fontWeight='700';">
        </div>

        <!-- Nombre de usuario -->
        <h1 class="title">pepito bodega</h1>

        <!-- Contenedor de Tarjetas -->
        <div id="cuentas-container" class="space-y-4">
            <!-- Skeleton loading -->
            <div class="space-y-4">
                <div class="skeleton h-20 w-full"></div>
                <div class="skeleton h-20 w-full"></div>
                <div class="skeleton h-20 w-full"></div>
                <div class="skeleton h-20 w-full"></div>
                <div class="skeleton h-20 w-full"></div>
            </div>
        </div>

        <!-- Footer con enlace a WhatsApp con mensaje personalizado -->
        <div class="footer">
            Diseñado por 
            <a href="https://wa.me/51973952322?text=Hola%2C%20quiero%20uno%20igual%20por%20favor" target="_blank" rel="noopener noreferrer">
                Servicomp+
            </a>
        </div>
    </div>

    <script>
        // --- Configuración de OpenSheet ---
        const SHEET_ID = '1Zl-M7ed80euOnkmovHttyeARLHLa11jihP61DZaQ9Zs';
        const SHEET_NAME = 'bodega';
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

        // --- Estado del tema ---
        let darkMode = false;

        // --- Elementos del DOM ---
        const themeToggle = document.getElementById('themeToggle');
        const container = document.getElementById('cuentas-container');

        // --- Función para cambiar el tema ---
        function toggleTheme() {
            darkMode = !darkMode;
            const body = document.body;
            const icon = themeToggle.querySelector('i');
            
            if (darkMode) {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                icon.className = 'fa-regular fa-sun';
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                icon.className = 'fa-regular fa-moon';
            }
            
            localStorage.setItem('theme', darkMode ? 'dark' : 'light');
        }

        // --- Cargar tema guardado ---
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                darkMode = true;
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                themeToggle.querySelector('i').className = 'fa-regular fa-sun';
            }
        }

        // --- Event listener para el botón de tema ---
        themeToggle.addEventListener('click', toggleTheme);

        // --- Función para copiar texto al portapapeles ---
        function copiarTexto(texto, evento) {
            if (evento) {
                evento.stopPropagation();
            }
            
            navigator.clipboard.writeText(texto).then(() => {
                mostrarNotificacion('✅ ¡Copiado al portapapeles!', 'success');
            }).catch(err => {
                console.error('Error al copiar: ', err);
                const textarea = document.createElement('textarea');
                textarea.value = texto;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                mostrarNotificacion('✅ ¡Copiado al portapapeles!', 'success');
            });
        }

        // --- Función para mostrar el QR en modal ---
        function mostrarQR(imageQr, banco, nombre, logoBanco) {
            if (!imageQr || imageQr.length === 0) {
                mostrarNotificacion('⚠️ No hay código QR disponible para este banco', 'info');
                return;
            }

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            
            // Determinar si hay logo o usar texto
            const logoHtml = logoBanco ? 
                `<img src="${logoBanco}" alt="${banco}">` : 
                `<span class="logo-text">${banco.substring(0, 4).toUpperCase()}</span>`;
            
            overlay.innerHTML = `
                <div class="modal-content" onclick="event.stopPropagation()">
                    <!-- Logo del banco en la esquina superior izquierda -->
                    <div class="modal-logo" style="background: ${darkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)'};">
                        ${logoHtml}
                    </div>
                    
                    <div class="flex justify-end items-center mb-4">
                        <button onclick="this.closest('.modal-overlay').remove()" 
                                class="text-gray-400 hover:text-gray-600 transition text-xl"
                                style="color: ${darkMode ? '#9ca3af' : '#9ca3af'}">
                            <i class="fa-regular fa-circle-xmark"></i>
                        </button>
                    </div>
                    
                    <div class="mb-4 bg-gray-50 rounded-lg p-4" style="background: ${darkMode ? '#3a3a3a' : '#f9fafb'}">
                        <img src="${imageQr}" alt="QR ${banco}" class="w-full h-auto rounded-lg" 
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23f3f4f6%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%236b7280%22 font-family=%22sans-serif%22 font-size=%2216%22%3EQR no disponible%3C/text%3E%3C/svg%3E'">
                    </div>
                    
                    <!-- Solo el nombre del titular al final -->
                    <div class="modal-titular" style="color: ${darkMode ? '#f0f0f0' : '#111827'}">
                        ${nombre}
                    </div>
                    
                    <button onclick="this.closest('.modal-overlay').remove()" 
                            class="mt-4 w-full py-2 px-4 rounded-lg transition font-medium"
                            style="background-color: ${darkMode ? '#404040' : '#f3f4f6'}; color: ${darkMode ? '#f0f0f0' : '#1f2937'};">
                        <i class="fa-regular fa-circle-xmark"></i> Cerrar
                    </button>
                </div>
            `;
            
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.remove();
                }
            });
            
            document.body.appendChild(overlay);
        }

        // --- Función para mostrar notificaciones ---
        function mostrarNotificacion(mensaje, tipo = 'success') {
            const colores = {
                success: darkMode ? '#059669' : '#10b981',
                info: darkMode ? '#2563eb' : '#3b82f6',
                error: darkMode ? '#dc2626' : '#ef4444'
            };
            
            const notificacion = document.createElement('div');
            notificacion.className = 'notification';
            notificacion.style.backgroundColor = colores[tipo] || colores.success;
            notificacion.style.color = '#ffffff';
            notificacion.textContent = mensaje;
            document.body.appendChild(notificacion);
            
            setTimeout(() => {
                notificacion.style.opacity = '0';
                notificacion.style.transform = 'translateX(-50%) translateY(-20px)';
                setTimeout(() => notificacion.remove(), 300);
            }, 2500);
        }

        // --- Función para obtener y procesar los datos ---
        async function cargarCuentas() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`Error al cargar los datos: ${response.status}`);
                }
                const cuentas = await response.json();
                renderizarCuentas(cuentas);

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert" style="${darkMode ? 'background-color: #7f1d1d; border-color: #991b1b; color: #fca5a5;' : ''}">
                        <strong class="font-bold">¡Ups!</strong>
                        <span class="block sm:inline"> No se pudieron cargar las cuentas.</span>
                        <button onclick="cargarCuentas()" class="mt-2 font-bold py-1 px-3 rounded text-sm transition" style="background-color: ${darkMode ? '#991b1b' : '#ef4444'}; color: white;">
                            Reintentar
                        </button>
                    </div>
                `;
            }
        }

        // --- Función para renderizar las tarjetas ---
        function renderizarCuentas(cuentas) {
            if (!cuentas || cuentas.length === 0) {
                container.innerHTML = `
                    <div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded relative" role="alert" style="${darkMode ? 'background-color: #78350f; border-color: #92400e; color: #fde68a;' : ''}">
                        <span class="block sm:inline">No se encontraron cuentas en la hoja de cálculo.</span>
                    </div>
                `;
                return;
            }

            let html = '';
            cuentas.forEach((cuenta, index) => {
                const id = cuenta.id || index + 1;
                const banco = cuenta.banco || 'Banco';
                const nombre = cuenta.nombre || 'Titular';
                const telefono = cuenta.telefono || '';
                const cta = cuenta.cta || '';
                const cci = cuenta.cci || '';
                const color = cuenta.color || '#6b7280';
                const logoBanco = cuenta.logo_banco || '';
                const imageQr = cuenta.image_qr || '';

                const esYapePlin = telefono && telefono.length > 0;
                const tieneQR = imageQr && imageQr.length > 0;

                html += `
                    <div class="account-card" style="background: ${color};">
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center font-bold text-sm text-white flex-shrink-0">
                                ${logoBanco ? `<img src="${logoBanco}" alt="${banco}" class="w-8 h-8 object-contain">` : banco.substring(0, 4).toUpperCase()}
                            </div>
                            <div class="text-left truncate">
                                <p class="font-bold text-sm truncate text-white">${nombre}</p>
                                ${esYapePlin ? `
                                    <p class="text-account opacity-90 text-white clickable" onclick="copiarTexto('${telefono}', event)">
                                        ${telefono}
                                        <span class="tooltip">Click para copiar</span>
                                    </p>
                                ` : `
                                    <p class="text-account opacity-90 text-white clickable" onclick="copiarTexto('${cta}', event)">
                                        Cta: ${cta}
                                        <span class="tooltip">Click para copiar</span>
                                    </p>
                                    <p class="text-cci opacity-70 text-white truncate clickable" onclick="copiarTexto('${cci}', event)">
                                        CCI: ${cci}
                                        <span class="tooltip">Click para copiar</span>
                                    </p>
                                `}
                            </div>
                        </div>
                        ${tieneQR ? `
                            <button class="qr-button" onclick="mostrarQR('${imageQr}', '${banco}', '${nombre}', '${logoBanco}')">
                                <i class="fa-solid fa-qrcode"></i> QR
                            </button>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // --- Cargar tema y datos al iniciar ---
        loadTheme();
        cargarCuentas();
    </script>

</body>
</html>
